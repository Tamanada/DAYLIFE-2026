name: daylife
description: "Every day counts. What will you do with yours?"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Core
  supabase_flutter: ^2.9.1
  sizer: ^2.0.15
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2

  # Features
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.4
  fluttertoast: ^8.2.4
  fl_chart: ^0.65.0
  intl: ^0.19.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  flutter_slidable: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
